experiment_name: lodo_mmse_adni_holdout

task: mmse_regression
train_mode: lodo_baseline

environment:
  data_root_env: BRAINAGE_DATA_ROOT
  output_root_env: BRAINAGE_OUTPUT_ROOT
  metadata_root_env: BRAINAGE_METADATA_ROOT

data:
  metadata_file: merged_metadata.csv
  cohorts:
    - hcp
    - adni
  image_size: [96, 96, 96]

split:
  strategy: lodo
  holdout_cohort: adni
  split_file: data/splits/lodo_adni_holdout.csv

model:
  in_channels: 1
  channels: [16, 32, 64, 128]
  head_hidden_dim: 128
  head_dropout: 0.2
  use_demographics: false
  tabular_hidden_dim: 16

training:
  seed: 42
  batch_size: 2
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.00001
  num_workers: 4
  device: auto
  mixed_precision: auto
  cudnn_benchmark: true
  loss: huber
  huber_delta: 1.0
  scheduler: plateau
  scheduler_metric: mae
  scheduler_factor: 0.5
  scheduler_patience: 4
  scheduler_min_lr: 0.000001
  selection_metric: mae

outputs:
  run_dir: outputs/lodo_mmse_adni_holdout
  cache_dir: outputs/cache/lodo_mmse_adni_holdout

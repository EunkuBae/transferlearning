experiment_name: adni_cls_multimodal_transfer_full_ft

data:
  metadata_file: ADNI_MPR_N3_metadata.csv
  metadata_file_env: ADNI_METADATA_FILE
  image_dir: /data/C3_ADNI/ADNI_MPR_N3_ALL
  image_dir_env: ADNI_IMAGE_DIR
  subject_id_column: PTID
  diagnosis_column: DX_bl
  age_column: AGE
  sex_column: PTGENDER
  mmse_column: MMSE
  image_name_column: file_name
  image_size: [96, 96, 96]

split:
  val_ratio: 0.15
  test_ratio: 0.15
  split_file: data/splits/adni_cls_seed42.csv
  save_split_file: true

model:
  num_classes: 3
  in_channels: 1
  channels: [16, 32, 64, 128]
  head_hidden_dim: 128
  head_dropout: 0.2
  use_demographics: true
  tabular_hidden_dim: 16

transfer:
  source_checkpoint: outputs/hcp_mmse_multimodal_baseline/best_model.pt
  source_checkpoint_env: SOURCE_CHECKPOINT_PATH
  load_mode: full
  freeze_backbone: false

training:
  seed: 42
  batch_size: 4
  epochs: 20
  learning_rate: 0.00005
  weight_decay: 0.00001
  num_workers: 8
  device: auto
  mixed_precision: auto
  cudnn_benchmark: true
  scheduler: plateau
  scheduler_metric: balanced_accuracy
  scheduler_factor: 0.5
  scheduler_patience: 3
  scheduler_min_lr: 0.000001
  selection_metric: balanced_accuracy
  class_weighting: balanced
  sampler: balanced

outputs:
  run_dir: outputs/adni_cls_multimodal_transfer_full_ft
  run_dir_env:
  cache_dir: outputs/cache/adni_cls_multimodal_transfer_full_ft
  cache_dir_env:

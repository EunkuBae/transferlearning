experiment_name: oasis_mmse_multimodal_transfer_full_ft

data:
  metadata_file: OASIS_MMSE.xlsx
  metadata_file_env: OASIS_MMSE_METADATA_FILE
  image_dir: D:/C2_OASIS
  image_dir_env: OASIS_IMAGE_DIR
  subject_id_column: subject_id
  target_column: mmse
  age_column: age
  sex_column: gender
  image_size: [96, 96, 96]

split:
  val_ratio: 0.2
  test_ratio: 0.2

model:
  in_channels: 1
  channels: [16, 32, 64, 128]
  head_hidden_dim: 128
  head_dropout: 0.2
  use_demographics: true
  tabular_hidden_dim: 16

transfer:
  source_checkpoint: outputs/hcp_mmse_multimodal_baseline/best_model.pt
  source_checkpoint_env: SOURCE_CHECKPOINT_PATH
  load_mode: full
  freeze_backbone: false

training:
  seed: 42
  batch_size: 2
  epochs: 30
  learning_rate: 0.00005
  weight_decay: 0.00001
  num_workers: 4
  device: auto
  mixed_precision: auto
  cudnn_benchmark: true
  loss: huber
  huber_delta: 1.0
  scheduler: plateau
  scheduler_metric: mae
  scheduler_factor: 0.5
  scheduler_patience: 4
  scheduler_min_lr: 0.000001
  selection_metric: mae

outputs:
  run_dir: outputs/oasis_mmse_multimodal_transfer_full_ft
  run_dir_env:
  cache_dir: outputs/cache/oasis_mmse_multimodal_transfer_full_ft
  cache_dir_env:

experiment_name: mmse_pretraining_erm

data:
  image_size: [96, 96, 96]
  hcp:
    csv_file: HCP_A_id_sex_age_mmse_moca.csv
    csv_file_env: HCP_MMSE_CSV
    image_dir: D:/C1_HCP/hcp_aging
    image_dir_env: HCP_IMAGE_DIR
    subject_id_column: subject_id
    target_column: mmse
    age_column: age
    sex_column: sex
    domain_name: hcp
    domain_index: 0
  oasis:
    metadata_file: OASIS_MMSE.xlsx
    metadata_file_env: OASIS_MMSE_METADATA_FILE
    image_dir: D:/C2_OASIS
    image_dir_env: OASIS_IMAGE_DIR
    subject_id_column: subject_id
    target_column: mmse
    age_column: age
    sex_column: gender
    filter_column: diagnosis
    filter_values: [normal, control, cn, nc, cognitively normal]
    domain_name: oasis_nc
    domain_index: 1

split:
  val_ratio: 0.15
  test_ratio: 0.15

model:
  in_channels: 1
  channels: [16, 32, 64, 128]
  head_hidden_dim: 128
  head_dropout: 0.2
  use_demographics: false
  tabular_hidden_dim: 16

training:
  seed: 42
  batch_size: 2
  epochs: 20
  learning_rate: 0.0001
  weight_decay: 0.00001
  num_workers: 4
  device: auto
  mixed_precision: auto
  cudnn_benchmark: true
  loss: huber
  huber_delta: 1.0
  scheduler: plateau
  scheduler_metric: mae
  scheduler_factor: 0.5
  scheduler_patience: 3
  scheduler_min_lr: 0.000001
  selection_metric: mae

dg:
  method: erm
  groupdro_eta: 0.1

outputs:
  run_dir: outputs/mmse_pretraining_erm
  cache_dir: outputs/cache/mmse_pretraining_erm
